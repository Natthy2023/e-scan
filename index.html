<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/artboard-1.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ኢ - Scan: AI-powered recycling assistant for Ethiopia - Scan waste items and learn how to recycle them correctly" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" />
    <link rel="preconnect" href="https://firebaseio.com" />
    
    <!-- DNS prefetch for performance -->
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
    
    <title>ኢ - Scan - AI Recycling Assistant for Ethiopia</title>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8320354212559217"
     crossorigin="anonymous"></script>
     
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered:', registration);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
